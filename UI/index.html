<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDITH Security Access</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="flex flex-col min-h-screen items-center justify-center p-8 md:p-12 lg:p-16 selection:bg-white/20 selection:text-white">
 
  <div class="bg-glow"></div>
  <div class="bg-glow-bottom"></div>

  
  <div class="fade-in arc-reactor-container mb-10 lg:mb-14" id="logo-root">
    <div class="arc-reactor">
      <div class="arc-reactor-core"></div>
      <div class="arc-reactor-ring"></div>
      <div class="arc-reactor-ring-outer"></div>
      <div class="arc-reactor-coils">
        <div class="arc-reactor-coil"></div>
        <div class="arc-reactor-coil"></div>
        <div class="arc-reactor-coil"></div>
        <div class="arc-reactor-coil"></div>
        <div class="arc-reactor-coil"></div>
        <div class="arc-reactor-coil"></div>
        <div class="arc-reactor-coil"></div>
        <div class="arc-reactor-coil"></div>
      </div>
    </div>
  </div>

 
  <div class="fade-in glass-panel w-full max-w-md rounded-[24px] p-8 md:p-10 lg:p-12 flex flex-col gap-8 shadow-2xl" id="card-auth">
   
    <div class="flex border-b border-white/5 pb-2" id="tabs-header">
      <button id="tab-login" class="flex-1 text-center py-2 text-sm font-medium border-b-2 border-white/70 text-white transition-all cursor-pointer">
        Login
      </button>
      <button id="tab-register" class="flex-1 text-center py-2 text-sm font-medium border-b-2 border-transparent text-white/50 hover:text-white/80 transition-all cursor-pointer">
        Register
      </button>
    </div>

   
    <form id="form-login" class="flex flex-col gap-4">
      <div class="flex flex-col gap-1" id="group-login-username">
        <label for="login-username" class="text-[10px] uppercase tracking-widest text-white/30 font-semibold mb-1">Username</label>
        <input type="text" id="login-username" class="glass-input px-4 py-3 text-sm focus:ring-1 focus:ring-white/20" placeholder="operator" required autocomplete="username">
      </div>
      <div class="flex flex-col gap-1" id="group-login-password">
        <label for="login-password" class="text-[10px] uppercase tracking-widest text-white/30 font-semibold mb-1">Password</label>
        <input type="password" id="login-password" class="glass-input px-4 py-3 text-sm focus:ring-1 focus:ring-white/20" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <div id="login-error" class="text-rose-450 text-xs mt-1 hidden font-sans leading-relaxed"></div>
      <button type="submit" class="apple-button w-full py-3 mt-2 text-sm" id="btn-login-submit">
        Connect to EDITH
      </button>
    </form>

    
    <form id="form-register" class="flex flex-col gap-4 hidden">
      <div class="flex flex-col gap-1" id="group-reg-username">
        <label for="register-username" class="text-[10px] uppercase tracking-widest text-white/30 font-semibold mb-1">Desired Username</label>
        <input type="text" id="register-username" class="glass-input px-4 py-3 text-sm focus:ring-1 focus:ring-white/20" placeholder="operator" autocomplete="username">
      </div>
      <div class="flex flex-col gap-1" id="group-reg-password">
        <label for="register-password" class="text-[10px] uppercase tracking-widest text-white/30 font-semibold mb-1">Security Password</label>
        <input type="password" id="register-password" class="glass-input px-4 py-3 text-sm focus:ring-1 focus:ring-white/20" placeholder="••••••••" autocomplete="new-password">
      </div>
      <div class="flex flex-col gap-1" id="group-reg-confirm">
        <label for="register-confirm" class="text-[10px] uppercase tracking-widest text-white/30 font-semibold mb-1">Confirm Password</label>
        <input type="password" id="register-confirm" class="glass-input px-4 py-3 text-sm focus:ring-1 focus:ring-white/20" placeholder="••••••••" autocomplete="new-password">
      </div>
      <div id="register-error" class="text-rose-450 text-xs mt-1 hidden font-sans leading-relaxed"></div>
      <div id="register-success" class="text-emerald-400 text-xs mt-1 hidden font-sans leading-relaxed">Account registered successfully! Switch to Login.</div>
      <button type="submit" class="apple-button w-full py-3 mt-2 text-sm" id="btn-register-submit">
        Register Profile
      </button>
    </form>
  </div>

  <script src="/script.js"></script>
</body>
</html>
